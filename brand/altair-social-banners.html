<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altair Social Media Banner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-text {
            background: linear-gradient(135deg, #60A5FA 0%, #3B82F6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="bg-slate-900 p-8">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-white text-2xl font-bold mb-4">Altair Social Media Assets</h1>
        <p class="text-slate-400 mb-8">Right-click on any banner → Save Image As → Use for your profiles</p>
        
        <!-- Twitter/X Header (1500x500) -->
        <div class="mb-12">
            <h2 class="text-white text-xl font-semibold mb-4">Twitter/X Header (1500×500)</h2>
            <svg id="twitter-banner" viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg" class="w-full border border-slate-700 rounded-lg">
                <defs>
                    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
                        <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
                    </linearGradient>
                    <radialGradient id="glow1">
                        <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.3" />
                        <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:0" />
                    </radialGradient>
                </defs>
                
                <!-- Background -->
                <rect width="1500" height="500" fill="#0F172A"/>
                
                <!-- Subtle grid pattern -->
                <g opacity="0.03">
                    <line x1="0" y1="100" x2="1500" y2="100" stroke="#60A5FA" stroke-width="1"/>
                    <line x1="0" y1="200" x2="1500" y2="200" stroke="#60A5FA" stroke-width="1"/>
                    <line x1="0" y1="300" x2="1500" y2="300" stroke="#60A5FA" stroke-width="1"/>
                    <line x1="0" y1="400" x2="1500" y2="400" stroke="#60A5FA" stroke-width="1"/>
                    <line x1="300" y1="0" x2="300" y2="500" stroke="#60A5FA" stroke-width="1"/>
                    <line x1="600" y1="0" x2="600" y2="500" stroke="#60A5FA" stroke-width="1"/>
                    <line x1="900" y1="0" x2="900" y2="500" stroke="#60A5FA" stroke-width="1"/>
                    <line x1="1200" y1="0" x2="1200" y2="500" stroke="#60A5FA" stroke-width="1"/>
                </g>
                
                <!-- Glow effect -->
                <circle cx="450" cy="250" r="200" fill="url(#glow1)"/>
                
                <!-- Icon -->
                <g transform="translate(300, 100)">
                    <circle cx="150" cy="150" r="135" fill="#0A0F1E"/>
                    <path d="M 150 75 L 180 150 L 150 225 L 120 150 Z" fill="url(#grad1)"/>
                    <path d="M 150 75 L 180 150 L 150 135 Z" fill="#60A5FA" opacity="0.5"/>
                    <path d="M 180 150 L 150 225 L 165 150 Z" fill="#1E40AF" opacity="0.3"/>
                </g>
                
                <!-- Text -->
                <text x="700" y="235" font-size="120" font-weight="800" fill="#FFFFFF">Altair</text>
                <text x="700" y="310" font-size="36" font-weight="600" fill="#60A5FA">Where focus takes flight</text>
                
                <!-- Small stars decoration -->
                <circle cx="1350" cy="150" r="3" fill="#60A5FA" opacity="0.6"/>
                <circle cx="1400" cy="120" r="2" fill="#60A5FA" opacity="0.4"/>
                <circle cx="1380" cy="180" r="2.5" fill="#60A5FA" opacity="0.5"/>
            </svg>
            <button onclick="downloadSVG('twitter-banner', 'altair-twitter-banner-1500x500')" class="mt-4 px-6 py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-lg font-semibold">
                Download SVG
            </button>
        </div>

        <!-- GitHub Social Preview (1280x640) -->
        <div class="mb-12">
            <h2 class="text-white text-xl font-semibold mb-4">GitHub Social Preview (1280×640)</h2>
            <svg id="github-banner" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" class="w-full border border-slate-700 rounded-lg">
                <defs>
                    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
                        <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
                    </linearGradient>
                    <radialGradient id="glow2">
                        <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.4" />
                        <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:0" />
                    </radialGradient>
                </defs>
                
                <!-- Background -->
                <rect width="1280" height="640" fill="#0F172A"/>
                
                <!-- Grid -->
                <g opacity="0.03">
                    <line x1="0" y1="160" x2="1280" y2="160" stroke="#60A5FA" stroke-width="1"/>
                    <line x1="0" y1="320" x2="1280" y2="320" stroke="#60A5FA" stroke-width="1"/>
                    <line x1="0" y1="480" x2="1280" y2="480" stroke="#60A5FA" stroke-width="1"/>
                    <line x1="320" y1="0" x2="320" y2="640" stroke="#60A5FA" stroke-width="1"/>
                    <line x1="640" y1="0" x2="640" y2="640" stroke="#60A5FA" stroke-width="1"/>
                    <line x1="960" y1="0" x2="960" y2="640" stroke="#60A5FA" stroke-width="1"/>
                </g>
                
                <!-- Center glow -->
                <circle cx="640" cy="320" r="300" fill="url(#glow2)"/>
                
                <!-- Icon -->
                <g transform="translate(420, 140)">
                    <circle cx="140" cy="140" r="130" fill="#0A0F1E"/>
                    <path d="M 140 65 L 172 140 L 140 215 L 108 140 Z" fill="url(#grad2)"/>
                    <path d="M 140 65 L 172 140 L 140 127.5 Z" fill="#60A5FA" opacity="0.5"/>
                    <path d="M 172 140 L 140 215 L 156 140 Z" fill="#1E40AF" opacity="0.3"/>
                </g>
                
                <!-- Text -->
                <text x="640" y="390" font-size="100" font-weight="800" fill="#FFFFFF" text-anchor="middle">Altair</text>
                <text x="640" y="450" font-size="32" font-weight="600" fill="#60A5FA" text-anchor="middle">ADHD-Friendly Project Management</text>
                <text x="640" y="500" font-size="24" font-weight="500" fill="#94A3B8" text-anchor="middle">Open Source • Built by the Community</text>
            </svg>
            <button onclick="downloadSVG('github-banner', 'altair-github-preview-1280x640')" class="mt-4 px-6 py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-lg font-semibold">
                Download SVG
            </button>
        </div>

        <!-- LinkedIn Banner (1584x396) -->
        <div class="mb-12">
            <h2 class="text-white text-xl font-semibold mb-4">LinkedIn Banner (1584×396)</h2>
            <svg id="linkedin-banner" viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg" class="w-full border border-slate-700 rounded-lg">
                <defs>
                    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
                        <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
                    </linearGradient>
                    <radialGradient id="glow3">
                        <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.3" />
                        <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:0" />
                    </radialGradient>
                </defs>
                
                <!-- Background -->
                <rect width="1584" height="396" fill="#0F172A"/>
                
                <!-- Glow -->
                <circle cx="400" cy="198" r="180" fill="url(#glow3)"/>
                
                <!-- Icon -->
                <g transform="translate(250, 48)">
                    <circle cx="150" cy="150" r="135" fill="#0A0F1E"/>
                    <path d="M 150 75 L 180 150 L 150 225 L 120 150 Z" fill="url(#grad3)"/>
                    <path d="M 150 75 L 180 150 L 150 135 Z" fill="#60A5FA" opacity="0.5"/>
                    <path d="M 180 150 L 150 225 L 165 150 Z" fill="#1E40AF" opacity="0.3"/>
                </g>
                
                <!-- Text -->
                <text x="650" y="175" font-size="90" font-weight="800" fill="#FFFFFF">Altair</text>
                <text x="650" y="240" font-size="28" font-weight="600" fill="#60A5FA">Where focus takes flight</text>
                <text x="650" y="280" font-size="22" font-weight="500" fill="#94A3B8">ADHD-Friendly Project Management • Open Source</text>
            </svg>
            <button onclick="downloadSVG('linkedin-banner', 'altair-linkedin-banner-1584x396')" class="mt-4 px-6 py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-lg font-semibold">
                Download SVG
            </button>
        </div>

        <!-- Discord Server Banner (960x540) -->
        <div class="mb-12">
            <h2 class="text-white text-xl font-semibold mb-4">Discord Server Banner (960×540)</h2>
            <svg id="discord-banner" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" class="w-full border border-slate-700 rounded-lg">
                <defs>
                    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
                        <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
                    </linearGradient>
                    <radialGradient id="glow4">
                        <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.5" />
                        <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:0" />
                    </radialGradient>
                </defs>
                
                <!-- Background -->
                <rect width="960" height="540" fill="#0F172A"/>
                
                <!-- Center glow -->
                <circle cx="480" cy="270" r="250" fill="url(#glow4)"/>
                
                <!-- Icon -->
                <g transform="translate(330, 90)">
                    <circle cx="150" cy="180" r="140" fill="#0A0F1E"/>
                    <path d="M 150 105 L 182 180 L 150 255 L 118 180 Z" fill="url(#grad4)"/>
                    <path d="M 150 105 L 182 180 L 150 167.5 Z" fill="#60A5FA" opacity="0.5"/>
                    <path d="M 182 180 L 150 255 L 166 180 Z" fill="#1E40AF" opacity="0.3"/>
                </g>
                
                <!-- Text -->
                <text x="480" y="380" font-size="80" font-weight="800" fill="#FFFFFF" text-anchor="middle">Altair</text>
                <text x="480" y="440" font-size="28" font-weight="600" fill="#60A5FA" text-anchor="middle">ADHD-Friendly Project Management</text>
                <text x="480" y="485" font-size="22" font-weight="500" fill="#94A3B8" text-anchor="middle">Welcome to the community!</text>
            </svg>
            <button onclick="downloadSVG('discord-banner', 'altair-discord-banner-960x540')" class="mt-4 px-6 py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-lg font-semibold">
                Download SVG
            </button>
        </div>
    </div>

    <script>
        function downloadSVG(elementId, filename) {
            const svg = document.getElementById(elementId);
            const svgData = new XMLSerializer().serializeToString(svg);
            const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename + '.svg';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
