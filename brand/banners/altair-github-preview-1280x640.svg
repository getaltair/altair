<svg id="github-banner" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" class="w-full border border-slate-700 rounded-lg">
                <defs>
                    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1"/>
                        <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1"/>
                    </linearGradient>
                    <radialGradient id="glow2">
                        <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.4"/>
                        <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:0"/>
                    </radialGradient>
                </defs>

                <!-- Background -->
                <rect width="1280" height="640" fill="#0F172A"/>

                <!-- Grid -->
                <g opacity="0.03">
                    <line x1="0" y1="160" x2="1280" y2="160" stroke="#60A5FA" stroke-width="1"/>
                    <line x1="0" y1="320" x2="1280" y2="320" stroke="#60A5FA" stroke-width="1"/>
                    <line x1="0" y1="480" x2="1280" y2="480" stroke="#60A5FA" stroke-width="1"/>
                    <line x1="320" y1="0" x2="320" y2="640" stroke="#60A5FA" stroke-width="1"/>
                    <line x1="640" y1="0" x2="640" y2="640" stroke="#60A5FA" stroke-width="1"/>
                    <line x1="960" y1="0" x2="960" y2="640" stroke="#60A5FA" stroke-width="1"/>
                </g>

                <!-- Center glow -->
                <circle cx="640" cy="320" r="300" fill="url(#glow2)"/>

                <!-- Icon -->
                <g transform="translate(420, 140)">
                    <circle cx="140" cy="140" r="130" fill="#0A0F1E"/>
                    <path d="M 140 65 L 172 140 L 140 215 L 108 140 Z" fill="url(#grad2)"/>
                    <path d="M 140 65 L 172 140 L 140 127.5 Z" fill="#60A5FA" opacity="0.5"/>
                    <path d="M 172 140 L 140 215 L 156 140 Z" fill="#1E40AF" opacity="0.3"/>
                </g>

                <!-- Text -->
                <text x="640" y="390" font-size="100" font-weight="800" fill="#FFFFFF" text-anchor="middle">Altair</text>
                <text x="640" y="450" font-size="32" font-weight="600" fill="#60A5FA" text-anchor="middle">ADHD-Friendly Project Management</text>
                <text x="640" y="500" font-size="24" font-weight="500" fill="#94A3B8" text-anchor="middle">Open Source • Built by the Community</text>
            </svg>
