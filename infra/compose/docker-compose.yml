# Altair development infrastructure
# Usage: docker compose -f infra/compose/docker-compose.yml up -d

services:
  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: altair
      POSTGRES_USER: altair
      POSTGRES_PASSWORD: altair_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U altair"]
      interval: 5s
      timeout: 5s
      retries: 5

  garage:
    image: dxflrs/garage:v2.2.0
    ports:
      - "3900:3900" # S3 API
      - "3901:3901" # RPC
      - "3902:3902" # Web
      - "3903:3903" # Admin
    volumes:
      - ./garage.toml:/etc/garage.toml
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    restart: unless-stopped

  powersync:
    image: journeyapps/powersync-service:latest
    ports:
      - "8080:8080"
    volumes:
      - ../powersync:/config
    environment:
      POWERSYNC_CONFIG: /config/powersync.yaml
      # Must be base64url-encoded (RFC 7517). The Rust server signs with the raw decoded bytes.
      POWERSYNC_JWT_SECRET: ${POWERSYNC_JWT_SECRET:-ZGV2X3Bvd2Vyc3luY19zZWNyZXRfY2hhbmdlX2luX3Byb2R1Y3Rpb24}
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
    restart: unless-stopped

  # Altair backend server
  server:
    build:
      context: ../../
      dockerfile: apps/server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://altair:altair_dev@postgres:5432/altair
      PORT: 3000
      RUST_LOG: info
      APP_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  pgdata:
  mongodata:
  garage-meta:
  garage-data:
