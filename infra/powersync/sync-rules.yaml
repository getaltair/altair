# PowerSync Stream Configuration Example
#
# Stream names defined here must match the canonical identifiers in:
#   packages/contracts/registry/sync-streams.json
#
# Entity types used in WHERE clauses must match:
#   packages/contracts/registry/entity-types.json
#
# Run: python scripts/generate_contracts.py --root packages/contracts
# to regenerate bindings after modifying registry files.
#
# Auto-subscribed streams sync immediately when the client connects.
# On-demand streams are subscribed when the user navigates into a deeper context.

config:
  edition: 3
  timestamp_max_precision: milliseconds

streams:
  my_profile:
    auto_subscribe: true
    query: |
      SELECT id, email, display_name, timezone, default_household_id, is_active, created_at, updated_at
      FROM users
      WHERE id = auth.user_id() AND deleted_at IS NULL

  my_memberships:
    auto_subscribe: true
    queries:
      - |
        SELECT id, household_id, user_id, role, is_active, created_at, updated_at
        FROM household_memberships
        WHERE user_id = auth.user_id() AND deleted_at IS NULL
      - |
        SELECT h.id, h.owner_user_id, h.name, h.slug, h.description, h.created_at, h.updated_at, h.deleted_at
        FROM households h
        WHERE h.id IN (
          SELECT hm.household_id
          FROM household_memberships hm
          WHERE hm.user_id = auth.user_id() AND hm.deleted_at IS NULL
        ) AND h.deleted_at IS NULL

  my_personal_data:
    auto_subscribe: true
    queries:
      - |
        SELECT id, owner_user_id, household_id, title, slug, description, status, start_date, target_date, completed_at, created_at, updated_at, deleted_at
        FROM initiatives
        WHERE owner_user_id = auth.user_id() AND deleted_at IS NULL
      - |
        SELECT id, owner_user_id, household_id, initiative_id, title, description, cadence_type, cadence_config, is_active, last_completed_at, created_at, updated_at, deleted_at
        FROM guidance_routines
        WHERE owner_user_id = auth.user_id() AND deleted_at IS NULL
      - |
        SELECT id, owner_user_id, household_id, name, color, description, created_at, updated_at, deleted_at
        FROM tags
        WHERE owner_user_id = auth.user_id() AND deleted_at IS NULL
      - |
        SELECT id, initiative_id, epic_id, owner_user_id, household_id, assigned_user_id, title, description, status, priority, energy_level, due_at, scheduled_for, completed_at, sort_order, created_at, updated_at, deleted_at
        FROM guidance_quests
        WHERE (owner_user_id = auth.user_id() OR assigned_user_id = auth.user_id()) AND deleted_at IS NULL

  my_household_data:
    auto_subscribe: true
    queries:
      - |
        WITH my_households AS (
          SELECT household_id
          FROM household_memberships
          WHERE user_id = auth.user_id() AND deleted_at IS NULL
        )
        SELECT id, owner_user_id, household_id, title, slug, description, status, start_date, target_date, completed_at, created_at, updated_at, deleted_at
        FROM initiatives
        WHERE household_id IN my_households AND deleted_at IS NULL
      - |
        WITH my_households AS (
          SELECT household_id
          FROM household_memberships
          WHERE user_id = auth.user_id() AND deleted_at IS NULL
        )
        SELECT id, initiative_id, epic_id, owner_user_id, household_id, assigned_user_id, title, description, status, priority, energy_level, due_at, scheduled_for, completed_at, sort_order, created_at, updated_at, deleted_at
        FROM guidance_quests
        WHERE household_id IN my_households AND deleted_at IS NULL
      - |
        WITH my_households AS (
          SELECT household_id
          FROM household_memberships
          WHERE user_id = auth.user_id() AND deleted_at IS NULL
        )
        SELECT id, owner_user_id, household_id, initiative_id, title, description, cadence_type, cadence_config, is_active, last_completed_at, created_at, updated_at, deleted_at
        FROM guidance_routines
        WHERE household_id IN my_households AND deleted_at IS NULL
      - |
        WITH my_households AS (
          SELECT household_id
          FROM household_memberships
          WHERE user_id = auth.user_id() AND deleted_at IS NULL
        )
        SELECT id, owner_user_id, household_id, parent_location_id, name, location_type, description, created_at, updated_at, deleted_at
        FROM tracking_locations
        WHERE household_id IN my_households AND deleted_at IS NULL
      - |
        WITH my_households AS (
          SELECT household_id
          FROM household_memberships
          WHERE user_id = auth.user_id() AND deleted_at IS NULL
        )
        SELECT id, owner_user_id, household_id, name, description, created_at, updated_at, deleted_at
        FROM tracking_categories
        WHERE household_id IN my_households AND deleted_at IS NULL
      - |
        WITH my_households AS (
          SELECT household_id
          FROM household_memberships
          WHERE user_id = auth.user_id() AND deleted_at IS NULL
        )
        SELECT id, owner_user_id, household_id, initiative_id, location_id, category_id, name, description, sku, barcode, quantity, unit, min_quantity, reorder_quantity, is_consumable, expires_at, last_seen_at, metadata_json, created_at, updated_at, deleted_at
        FROM tracking_items
        WHERE household_id IN my_households AND deleted_at IS NULL
      - |
        WITH my_households AS (
          SELECT household_id
          FROM household_memberships
          WHERE user_id = auth.user_id() AND deleted_at IS NULL
        )
        SELECT id, owner_user_id, household_id, name, status, created_at, updated_at, deleted_at
        FROM tracking_shopping_lists
        WHERE household_id IN my_households AND deleted_at IS NULL
      - |
        WITH my_households AS (
          SELECT household_id
          FROM household_memberships
          WHERE user_id = auth.user_id() AND deleted_at IS NULL
        ),
        household_lists AS (
          SELECT id
          FROM tracking_shopping_lists
          WHERE household_id IN my_households AND deleted_at IS NULL
        )
        SELECT id, shopping_list_id, item_id, name, quantity, unit, is_completed, notes, created_at, updated_at, deleted_at
        FROM tracking_shopping_list_items
        WHERE shopping_list_id IN household_lists AND deleted_at IS NULL
      - |
        WITH my_households AS (
          SELECT household_id
          FROM household_memberships
          WHERE user_id = auth.user_id() AND deleted_at IS NULL
        )
        SELECT id, owner_user_id, household_id, name, color, description, created_at, updated_at, deleted_at
        FROM tags
        WHERE household_id IN my_households AND deleted_at IS NULL

  my_relations:
    auto_subscribe: true
    queries:
      - |
        WITH my_households AS (
          SELECT household_id
          FROM household_memberships
          WHERE user_id = auth.user_id() AND deleted_at IS NULL
        )
        SELECT id, household_id, initiative_id, owner_user_id, created_by_user_id, updated_by_user_id,
               from_entity_type, from_entity_id, to_entity_type, to_entity_id,
               relation_type, source_type, status, confidence, evidence_json,
               created_by_process, last_confirmed_at, created_at, updated_at, deleted_at
        FROM entity_relations
        WHERE household_id IN my_households
          AND status IN ('accepted', 'suggested')
          AND deleted_at IS NULL
      - |
        SELECT id, household_id, initiative_id, owner_user_id, created_by_user_id, updated_by_user_id,
               from_entity_type, from_entity_id, to_entity_type, to_entity_id,
               relation_type, source_type, status, confidence, evidence_json,
               created_by_process, last_confirmed_at, created_at, updated_at, deleted_at
        FROM entity_relations
        WHERE owner_user_id = auth.user_id()
          AND household_id IS NULL
          AND status IN ('accepted', 'suggested')
          AND deleted_at IS NULL

  my_attachment_metadata:
    auto_subscribe: true
    queries:
      - |
        SELECT id, owner_user_id, household_id, initiative_id, storage_key, original_filename,
               mime_type, size_bytes, sha256, processing_status, metadata_json,
               created_at, updated_at, deleted_at
        FROM attachments
        WHERE owner_user_id = auth.user_id() AND deleted_at IS NULL
      - |
        WITH my_households AS (
          SELECT household_id
          FROM household_memberships
          WHERE user_id = auth.user_id() AND deleted_at IS NULL
        )
        SELECT id, owner_user_id, household_id, initiative_id, storage_key, original_filename,
               mime_type, size_bytes, sha256, processing_status, metadata_json,
               created_at, updated_at, deleted_at
        FROM attachments
        WHERE household_id IN my_households AND deleted_at IS NULL

  initiative_detail:
    queries:
      - |
        SELECT id, owner_user_id, household_id, title, slug, description, status, start_date, target_date, completed_at, created_at, updated_at, deleted_at
        FROM initiatives
        WHERE id = subscription.parameter('initiative_id')
          AND (
            owner_user_id = auth.user_id()
            OR household_id IN (
              SELECT household_id
              FROM household_memberships
              WHERE user_id = auth.user_id() AND deleted_at IS NULL
            )
          )
          AND deleted_at IS NULL
      - |
        SELECT id, initiative_id, owner_user_id, household_id, title, description, status, priority, sort_order, completed_at, created_at, updated_at, deleted_at
        FROM guidance_epics
        WHERE initiative_id = subscription.parameter('initiative_id')
          AND deleted_at IS NULL
      - |
        SELECT id, initiative_id, epic_id, owner_user_id, household_id, assigned_user_id, title, description, status, priority, energy_level, due_at, scheduled_for, completed_at, sort_order, created_at, updated_at, deleted_at
        FROM guidance_quests
        WHERE initiative_id = subscription.parameter('initiative_id')
          AND deleted_at IS NULL
      - |
        SELECT id, owner_user_id, household_id, initiative_id, parent_note_id, title, slug, note_type, content_markdown, content_text, is_pinned, archived_at, created_at, updated_at, deleted_at
        FROM knowledge_notes
        WHERE initiative_id = subscription.parameter('initiative_id')
          AND deleted_at IS NULL
      - |
        SELECT id, owner_user_id, household_id, initiative_id, location_id, category_id, name, description, sku, barcode, quantity, unit, min_quantity, reorder_quantity, is_consumable, expires_at, last_seen_at, metadata_json, created_at, updated_at, deleted_at
        FROM tracking_items
        WHERE initiative_id = subscription.parameter('initiative_id')
          AND deleted_at IS NULL

  note_detail:
    queries:
      - |
        SELECT id, owner_user_id, household_id, initiative_id, parent_note_id, title, slug, note_type, content_markdown, content_text, is_pinned, archived_at, created_at, updated_at, deleted_at
        FROM knowledge_notes
        WHERE id = subscription.parameter('note_id')
          AND (
            owner_user_id = auth.user_id()
            OR household_id IN (
              SELECT household_id
              FROM household_memberships
              WHERE user_id = auth.user_id() AND deleted_at IS NULL
            )
          )
          AND deleted_at IS NULL
      - |
        SELECT id, note_id, created_by_user_id, snapshot_type, content_markdown, content_text, metadata_json, created_at
        FROM knowledge_note_snapshots
        WHERE note_id = subscription.parameter('note_id')
      - |
        SELECT nt.note_id, nt.tag_id, nt.created_at
        FROM note_tags nt
        WHERE nt.note_id = subscription.parameter('note_id')
      - |
        SELECT na.note_id, na.attachment_id, na.created_at
        FROM note_attachments na
        WHERE na.note_id = subscription.parameter('note_id')
      - |
        SELECT id, household_id, initiative_id, owner_user_id, created_by_user_id, updated_by_user_id,
               from_entity_type, from_entity_id, to_entity_type, to_entity_id,
               relation_type, source_type, status, confidence, evidence_json,
               created_by_process, last_confirmed_at, created_at, updated_at, deleted_at
        FROM entity_relations
        WHERE (
          (from_entity_type = 'knowledge_note' AND from_entity_id = subscription.parameter('note_id'))
          OR
          (to_entity_type = 'knowledge_note' AND to_entity_id = subscription.parameter('note_id'))
        )
          AND deleted_at IS NULL

  item_history:
    queries:
      - |
        SELECT id, owner_user_id, household_id, initiative_id, location_id, category_id, name, description, sku, barcode, quantity, unit, min_quantity, reorder_quantity, is_consumable, expires_at, last_seen_at, metadata_json, created_at, updated_at, deleted_at
        FROM tracking_items
        WHERE id = subscription.parameter('item_id')
          AND (
            owner_user_id = auth.user_id()
            OR household_id IN (
              SELECT household_id
              FROM household_memberships
              WHERE user_id = auth.user_id() AND deleted_at IS NULL
            )
          )
          AND deleted_at IS NULL
      - |
        SELECT id, item_id, performed_by_user_id, event_type, delta_quantity, from_location_id, to_location_id, notes, metadata_json, occurred_at, created_at
        FROM tracking_item_events
        WHERE item_id = subscription.parameter('item_id')
      - |
        SELECT ia.item_id, ia.attachment_id, ia.created_at
        FROM item_attachments ia
        WHERE ia.item_id = subscription.parameter('item_id')
      - |
        SELECT it.item_id, it.tag_id, it.created_at
        FROM item_tags it
        WHERE it.item_id = subscription.parameter('item_id')
      - |
        SELECT id, household_id, initiative_id, owner_user_id, created_by_user_id, updated_by_user_id,
               from_entity_type, from_entity_id, to_entity_type, to_entity_id,
               relation_type, source_type, status, confidence, evidence_json,
               created_by_process, last_confirmed_at, created_at, updated_at, deleted_at
        FROM entity_relations
        WHERE (
          (from_entity_type = 'tracking_item' AND from_entity_id = subscription.parameter('item_id'))
          OR
          (to_entity_type = 'tracking_item' AND to_entity_id = subscription.parameter('item_id'))
        )
          AND deleted_at IS NULL

  quest_detail:
    queries:
      - |
        SELECT id, initiative_id, epic_id, owner_user_id, household_id, assigned_user_id, title, description, status, priority, energy_level, due_at, scheduled_for, completed_at, sort_order, created_at, updated_at, deleted_at
        FROM guidance_quests
        WHERE id = subscription.parameter('quest_id')
          AND (
            owner_user_id = auth.user_id()
            OR assigned_user_id = auth.user_id()
            OR household_id IN (
              SELECT household_id
              FROM household_memberships
              WHERE user_id = auth.user_id() AND deleted_at IS NULL
            )
          )
          AND deleted_at IS NULL
      - |
        SELECT qt.quest_id, qt.tag_id, qt.created_at
        FROM quest_tags qt
        WHERE qt.quest_id = subscription.parameter('quest_id')
      - |
        SELECT qa.quest_id, qa.attachment_id, qa.created_at
        FROM quest_attachments qa
        WHERE qa.quest_id = subscription.parameter('quest_id')
      - |
        SELECT id, user_id, quest_id, started_at, ended_at, duration_seconds, notes, created_at, updated_at, deleted_at
        FROM guidance_focus_sessions
        WHERE quest_id = subscription.parameter('quest_id')
      - |
        SELECT id, household_id, initiative_id, owner_user_id, created_by_user_id, updated_by_user_id,
               from_entity_type, from_entity_id, to_entity_type, to_entity_id,
               relation_type, source_type, status, confidence, evidence_json,
               created_by_process, last_confirmed_at, created_at, updated_at, deleted_at
        FROM entity_relations
        WHERE (
          (from_entity_type = 'guidance_quest' AND from_entity_id = subscription.parameter('quest_id'))
          OR
          (to_entity_type = 'guidance_quest' AND to_entity_id = subscription.parameter('quest_id'))
        )
          AND deleted_at IS NULL
