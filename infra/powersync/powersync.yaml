# PowerSync Service configuration for Altair
# Used by the self-hosted PowerSync service in Docker Compose
#
# Sync Streams edition 3 format with auth.user_id() for user scoping.
# All streams enforce row-level security via household membership checks.

replication:
  connections:
    - type: postgresql
      hostname: postgres
      port: 5432
      database: altair
      username: altair
      password: altair_dev
      sslmode: disable

storage:
  type: mongodb
  uri: mongodb://mongo:27017/powersync

port: 8080

client_auth:
  jwks:
    keys:
      - kty: oct
        alg: HS256
        k: !env POWERSYNC_JWT_SECRET
        kid: altair-dev-key

# -----------------------------------------------------------------------
# Sync Streams
# -----------------------------------------------------------------------
# 5 auto-subscribed streams (always synced on connect)
# 1 on-demand stream (subscribed when navigating to detail views)
#
# Every query filters by auth.user_id() or household membership subquery.
# No stream may return data belonging to other users.
# -----------------------------------------------------------------------

config:
  edition: 3
  timestamp_max_precision: milliseconds

streams:
  # -------------------------------------------------------------------
  # AUTO-SUBSCRIBED STREAMS
  # -------------------------------------------------------------------

  # 1. my_profile: current user's profile row
  my_profile:
    auto_subscribe: true
    query: |
      SELECT id, email, display_name, created_at, updated_at
      FROM users
      WHERE id = auth.user_id()

  # 2. my_memberships: user's household_memberships rows + household details
  my_memberships:
    auto_subscribe: true
    queries:
      - |
        SELECT id, household_id, user_id, role, joined_at
        FROM household_memberships
        WHERE user_id = auth.user_id()
      - |
        SELECT h.id, h.name, h.created_by, h.created_at
        FROM households h
        WHERE h.id IN (
          SELECT hm.household_id
          FROM household_memberships hm
          WHERE hm.user_id = auth.user_id()
        )

  # 3. my_personal_data: user's personal entities (not in a household)
  my_personal_data:
    auto_subscribe: true
    queries:
      - |
        SELECT id, user_id, household_id, name, description, status, created_at, updated_at
        FROM initiatives
        WHERE user_id = auth.user_id()
      - |
        SELECT id, user_id, household_id, name, color, created_at
        FROM tags
        WHERE user_id = auth.user_id()

  # 4. my_household_data: all entities belonging to households the user is a member of
  my_household_data:
    auto_subscribe: true
    queries:
      - |
        WITH my_households AS (
          SELECT household_id
          FROM household_memberships
          WHERE user_id = auth.user_id()
        )
        SELECT id, user_id, household_id, name, description, status, created_at, updated_at
        FROM initiatives
        WHERE household_id IN (SELECT household_id FROM my_households)
      - |
        WITH my_households AS (
          SELECT household_id
          FROM household_memberships
          WHERE user_id = auth.user_id()
        )
        SELECT id, user_id, household_id, name, color, created_at
        FROM tags
        WHERE household_id IN (SELECT household_id FROM my_households)

  # 5. my_relations: entity_relations where either side belongs to the user's scope
  my_relations:
    auto_subscribe: true
    queries:
      - |
        SELECT id, from_entity_type, from_entity_id, to_entity_type, to_entity_id,
               relation_type, source_type, status, confidence, evidence_json,
               created_by_user_id, created_by_process, last_confirmed_at,
               created_at, updated_at
        FROM entity_relations
        WHERE created_by_user_id = auth.user_id()

  # -------------------------------------------------------------------
  # ON-DEMAND STREAMS
  # -------------------------------------------------------------------

  # 6. initiative_detail: full data for a single initiative by ID
  initiative_detail:
    queries:
      - |
        SELECT id, user_id, household_id, name, description, status, created_at, updated_at
        FROM initiatives
        WHERE id = subscription.parameter('initiative_id')
          AND (
            user_id = auth.user_id()
            OR household_id IN (
              SELECT household_id
              FROM household_memberships
              WHERE user_id = auth.user_id()
            )
          )
      - |
        SELECT id, entity_type, entity_id, filename, content_type, storage_key,
               size_bytes, processing_state, created_at
        FROM attachments
        WHERE entity_type = 'initiative'
          AND entity_id = subscription.parameter('initiative_id')
      - |
        SELECT id, from_entity_type, from_entity_id, to_entity_type, to_entity_id,
               relation_type, source_type, status, confidence, evidence_json,
               created_by_user_id, created_by_process, last_confirmed_at,
               created_at, updated_at
        FROM entity_relations
        WHERE (
          (from_entity_type = 'initiative' AND from_entity_id = subscription.parameter('initiative_id'))
          OR
          (to_entity_type = 'initiative' AND to_entity_id = subscription.parameter('initiative_id'))
        )
