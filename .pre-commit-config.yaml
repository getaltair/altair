# Pre-commit hooks configuration for Altair monorepo
# See https://pre-commit.com for more information
repos:
  # Prettier - Format TypeScript, JavaScript, Svelte, JSON, YAML, Markdown
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown, svelte]
        additional_dependencies:
          - prettier@3.4.2
          - prettier-plugin-svelte@3.3.2

  # ESLint - Lint TypeScript and Svelte files
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.39.1
    hooks:
      - id: eslint
        files: \.(js|ts|tsx|svelte)$
        types: [file]
        additional_dependencies:
          - eslint@9.17.0
          - '@eslint/js@9.17.0'
          - '@typescript-eslint/eslint-plugin@8.18.1'
          - '@typescript-eslint/parser@8.18.1'
          - eslint-plugin-svelte@2.46.1
          - svelte-eslint-parser@1.4.0
          - typescript@5.7.2

  # TypeScript - Type checking (local hook, no mirror repo exists)
  - repo: local
    hooks:
      - id: tsc
        name: TypeScript type-check
        entry: pnpm exec tsc --noEmit --skipLibCheck
        language: system
        types_or: [ts, tsx]
        pass_filenames: false

  # Rust formatting
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        name: Rust fmt
        args: [--manifest-path, backend/Cargo.toml, --all]

  # Rust linting (clippy)
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: clippy
        name: Rust clippy
        args: [--manifest-path, backend/Cargo.toml, --all-targets, --, -D, warnings]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.svg$'
      - id: end-of-file-fixer
        exclude: '\.svg$'
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
