<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="knowledgeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="80" fill="url(#knowledgeGradient)"/>

  <!-- Book icon -->
  <g transform="translate(128, 128)">
    <!-- Book pages -->
    <path d="M64 32 L224 32 C240 32 256 48 256 64 L256 288 C256 304 240 320 224 320 L64 320 C48 320 32 304 32 288 L32 64 C32 48 48 32 64 32 Z"
          fill="white" opacity="0.95"/>

    <!-- Book spine -->
    <rect x="32" y="32" width="8" height="288" fill="white" opacity="0.8"/>

    <!-- Page lines -->
    <line x1="80" y1="96" x2="208" y2="96" stroke="url(#knowledgeGradient)" stroke-width="4" opacity="0.6"/>
    <line x1="80" y1="128" x2="208" y2="128" stroke="url(#knowledgeGradient)" stroke-width="4" opacity="0.6"/>
    <line x1="80" y1="160" x2="208" y2="160" stroke="url(#knowledgeGradient)" stroke-width="4" opacity="0.6"/>
    <line x1="80" y1="192" x2="176" y2="192" stroke="url(#knowledgeGradient)" stroke-width="4" opacity="0.6"/>
  </g>
</svg>
