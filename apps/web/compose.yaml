# DEPRECATED: This compose file is superseded by the root compose.yaml
# Use `docker compose -f ../../compose.yaml up -d` from the project root
# or `bun run db:start` from this directory (which now references root compose)
services:
  db:
    image: postgres
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: local
    volumes:
      - pgdata:/var/lib/postgresql
volumes:
  pgdata:
