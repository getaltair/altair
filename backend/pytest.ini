[pytest]
# Minimum Python version
minversion = 7.4

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test directories
testpaths = tests

# Show extra test summary info
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    --showlocals
    # Show summary of all test outcomes
    --tb=short
    # Strict markers - fail on unknown markers
    --strict-markers
    # Strict config - fail on unknown config options
    --strict-config
    # Show warnings
    -W default
    # Coverage options (when using --cov)
    --cov=altair
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    # Fail if coverage is below 70%
    --cov-fail-under=70

# Markers for categorizing tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    security: marks tests related to security features
    auth: marks tests related to authentication
    tasks: marks tests related to task management
    requires_db: marks tests that require database connection
    requires_redis: marks tests that require Redis connection

# Asyncio configuration for pytest-asyncio
asyncio_mode = auto

# Console output options
console_output_style = progress

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Ignore deprecation warnings from third-party libraries
filterwarnings =
    ignore::DeprecationWarning
    # But show our own deprecation warnings
    default::DeprecationWarning:altair.*
