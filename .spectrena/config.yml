# Spectrena Configuration

spec_id:
  template: "{component}-{NNN}-{slug}"
  padding: 3
  components:
    - CORE
    - GUIDANCE
    - TRACKING
    - KNOWLEDGE
    - PLATFORM
  numbering_source: "directory"

lineage:
  enabled: true
  lineage_db: "surrealkv://.spectrena/lineage"
  auto_register: true
