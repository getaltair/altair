name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Step 1: Detect what changed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
              - '!backend/**.md'

  # Step 2: Backend linting (only if backend changed)
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Add UV to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv venv
          uv sync --dev

      - name: Run Ruff linter
        run: uv run ruff check .

      - name: Run Ruff formatter check
        run: uv run ruff format --check --diff .

      - name: Run Pyright type checker
        run: uv run pyright

  # Step 3: Backend testing (only if backend changed)
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Add UV to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv venv
          uv sync --dev

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ \
            --cov=altair \
            --cov-report=xml \
            --cov-report=term \
            --cov-report=html \
            -v

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-${{ matrix.python-version }}
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: backend/htmlcov
          retention-days: 7

  # Step 4: GATEKEEPER - Always runs, validates results
  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [changes, lint, test]
    if: always() # Critical: must always run!
    steps:
      - name: Verify all checks passed or were appropriately skipped
        run: |
          echo "========================================="
          echo "Job Results Summary"
          echo "========================================="
          echo "Backend changed: ${{ needs.changes.outputs.backend }}"
          echo "Changes job: ${{ needs.changes.result }}"
          echo "Lint job: ${{ needs.lint.result }}"
          echo "Test job: ${{ needs.test.result }}"
          echo "========================================="

          # Changes detection must succeed
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "❌ ERROR: Failed to detect file changes"
            exit 1
          fi

          # If backend didn't change, lint/test should be skipped
          if [[ "${{ needs.changes.outputs.backend }}" != "true" ]]; then
            echo "✅ Backend files unchanged"
            echo "✅ Lint and test jobs appropriately skipped"
            exit 0
          fi

          # If backend changed, both jobs must succeed
          echo "Backend files were changed, validating jobs..."

          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "❌ ERROR: Lint job failed or was skipped unexpectedly"
            echo "   Result: ${{ needs.lint.result }}"
            exit 1
          fi

          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "❌ ERROR: Test job failed or was skipped unexpectedly"
            echo "   Result: ${{ needs.test.result }}"
            exit 1
          fi

          echo "✅ All checks passed successfully!"
