name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Step 1: Detect what changed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      flutter: ${{ steps.filter.outputs.flutter }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
              - '!backend/**.md'
            flutter:
              - 'flutter/**'
              - '.github/workflows/ci.yml'
              - '!flutter/**.md'

  # Step 2: Backend linting (only if backend changed)
  backend-lint:
    name: Backend Lint & Format
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Add UV to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv venv
          uv sync --dev

      - name: Run Ruff linter
        run: uv run ruff check .

      - name: Run Ruff formatter check
        run: uv run ruff format --check --diff .

      - name: Run Pyright type checker
        run: uv run pyright

  # Step 3: Backend testing (only if backend changed)
  backend-test:
    name: Backend Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Add UV to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv venv
          uv sync --dev

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ \
            --cov=altair \
            --cov-report=xml \
            --cov-report=term \
            --cov-report=html \
            -v

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-${{ matrix.python-version }}
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: backend/htmlcov
          retention-days: 7

  # Step 4: Flutter linting (only if Flutter changed)
  flutter-lint:
    name: Flutter Lint & Format
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.flutter == 'true'
    defaults:
      run:
        working-directory: ./flutter
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run Flutter analyzer
        run: flutter analyze

      - name: Run Dart format check
        run: dart format --set-exit-if-changed .

      - name: Run custom_lint (Riverpod)
        run: dart run custom_lint

  # Step 5: Flutter testing (only if Flutter changed)
  flutter-test:
    name: Flutter Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.flutter == 'true'
    defaults:
      run:
        working-directory: ./flutter
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests with coverage
        run: flutter test --coverage --reporter expanded

      - name: Generate coverage report
        run: |
          dart pub global activate coverage
          dart pub global run coverage:format_coverage \
            --lcov \
            --in=coverage \
            --out=coverage/lcov.info \
            --packages=.dart_tool/package_config.json \
            --report-on=lib

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./flutter/coverage/lcov.info
          flags: flutter
          name: flutter-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flutter-coverage-report
          path: flutter/coverage
          retention-days: 7

  # Step 6: Flutter build verification (only if Flutter changed)
  flutter-build:
    name: Flutter Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.flutter == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
          - platform: ios
            os: macos-latest
          - platform: web
            os: ubuntu-latest
    defaults:
      run:
        working-directory: ./flutter
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Set up Java (Android only)
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android APK
        if: matrix.platform == 'android'
        run: flutter build apk --debug --dart-define=FLUTTER_WEB_USE_SKIA=false

      - name: Build iOS (no codesign)
        if: matrix.platform == 'ios'
        run: flutter build ios --debug --no-codesign --dart-define=FLUTTER_WEB_USE_SKIA=false

      - name: Build Web
        if: matrix.platform == 'web'
        run: flutter build web --dart-define=FLUTTER_WEB_USE_SKIA=false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flutter-build-${{ matrix.platform }}
          path: |
            flutter/build/app/outputs/flutter-apk/*.apk
            flutter/build/ios/iphoneos/*.app
            flutter/build/web
          retention-days: 7

  # Step 7: GATEKEEPER - Always runs, validates results
  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [changes, backend-lint, backend-test, flutter-lint, flutter-test, flutter-build]
    if: always() # Critical: must always run!
    steps:
      - name: Verify all checks passed or were appropriately skipped
        run: |
          echo "========================================="
          echo "Job Results Summary"
          echo "========================================="
          echo "Backend changed: ${{ needs.changes.outputs.backend }}"
          echo "Flutter changed: ${{ needs.changes.outputs.flutter }}"
          echo "Changes job: ${{ needs.changes.result }}"
          echo ""
          echo "Backend Jobs:"
          echo "  Lint: ${{ needs.backend-lint.result }}"
          echo "  Test: ${{ needs.backend-test.result }}"
          echo ""
          echo "Flutter Jobs:"
          echo "  Lint: ${{ needs.flutter-lint.result }}"
          echo "  Test: ${{ needs.flutter-test.result }}"
          echo "  Build: ${{ needs.flutter-build.result }}"
          echo "========================================="

          # Changes detection must succeed
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "❌ ERROR: Failed to detect file changes"
            exit 1
          fi

          # Validate backend jobs if backend changed
          if [[ "${{ needs.changes.outputs.backend }}" == "true" ]]; then
            echo "Backend files were changed, validating jobs..."

            if [[ "${{ needs.backend-lint.result }}" != "success" ]]; then
              echo "❌ ERROR: Backend lint job failed or was skipped unexpectedly"
              echo "   Result: ${{ needs.backend-lint.result }}"
              exit 1
            fi

            if [[ "${{ needs.backend-test.result }}" != "success" ]]; then
              echo "❌ ERROR: Backend test job failed or was skipped unexpectedly"
              echo "   Result: ${{ needs.backend-test.result }}"
              exit 1
            fi

            echo "✅ Backend checks passed"
          else
            echo "✅ Backend files unchanged - jobs appropriately skipped"
          fi

          # Validate Flutter jobs if Flutter changed
          if [[ "${{ needs.changes.outputs.flutter }}" == "true" ]]; then
            echo "Flutter files were changed, validating jobs..."

            if [[ "${{ needs.flutter-lint.result }}" != "success" ]]; then
              echo "❌ ERROR: Flutter lint job failed or was skipped unexpectedly"
              echo "   Result: ${{ needs.flutter-lint.result }}"
              exit 1
            fi

            if [[ "${{ needs.flutter-test.result }}" != "success" ]]; then
              echo "❌ ERROR: Flutter test job failed or was skipped unexpectedly"
              echo "   Result: ${{ needs.flutter-test.result }}"
              exit 1
            fi

            if [[ "${{ needs.flutter-build.result }}" != "success" ]]; then
              echo "❌ ERROR: Flutter build job failed or was skipped unexpectedly"
              echo "   Result: ${{ needs.flutter-build.result }}"
              exit 1
            fi

            echo "✅ Flutter checks passed"
          else
            echo "✅ Flutter files unchanged - jobs appropriately skipped"
          fi

          echo "✅ All checks passed successfully!"
