name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build
        env:
          SQLX_OFFLINE: "true"

      - name: Clippy
        run: cargo clippy -- -D warnings
        env:
          SQLX_OFFLINE: "true"

      - name: Check sqlx offline cache
        run: cargo sqlx prepare --check --workspace
        env:
          SQLX_OFFLINE: "true"

      - name: Test
        run: cargo test
        env:
          SQLX_OFFLINE: "true"

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run check

      - name: Build
        run: bun run build

  android:
    name: Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/android/**/*.gradle*', 'apps/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build and Lint
        run: ./gradlew build lint

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [rust, web]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/server/target
          key: ${{ runner.os }}-cargo-smoke-${{ hashFiles('apps/server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Create .env from example
        run: cp .env.example .env
        working-directory: infra/compose

      - name: Start Compose stack
        run: docker compose -f infra/compose/docker-compose.yml up -d

      - name: Wait for Postgres
        run: |
          echo "Waiting for Postgres..."
          READY=false
          for i in $(seq 1 30); do
            if docker compose -f infra/compose/docker-compose.yml exec -T postgres pg_isready -U altair_user; then
              READY=true
              break
            fi
            echo "Attempt $i/30 failed, retrying in 5s..."
            sleep 5
          done
          if [ "$READY" != "true" ]; then
            echo "FAIL: Postgres did not become ready after 30 attempts"
            exit 1
          fi

      - name: Wait for Zitadel
        run: |
          echo "Waiting for Zitadel..."
          READY=false
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8081/debug/healthz; then
              READY=true
              break
            fi
            echo "Attempt $i/40 failed, retrying in 10s..."
            sleep 10
          done
          if [ "$READY" != "true" ]; then
            echo "FAIL: Zitadel did not become ready after 40 attempts"
            exit 1
          fi

      - name: Run migrations
        run: |
          DATABASE_URL=postgres://altair_user:change_me_in_production@localhost:5432/altair_db \
            sqlx migrate run --source infra/migrations

      - name: Apply seed data
        run: |
          PGPASSWORD=change_me_in_production psql -h localhost -U altair_user altair_db \
            -f infra/scripts/seed.sql

      - name: Verify seed (FA-008)
        run: |
          COUNT=$(PGPASSWORD=change_me_in_production psql -h localhost -U altair_user altair_db -tAc "SELECT count(*) FROM users")
          echo "User count: $COUNT"
          [ "$COUNT" -ge 1 ] || (echo "FAIL: seed produced 0 users" && exit 1)

      - name: Build server binary
        run: cargo build -p altair-server
        working-directory: apps/server
        env:
          SQLX_OFFLINE: "true"

      - name: Start server and check health (FA-S1)
        run: |
          DATABASE_URL=postgres://altair_user:change_me_in_production@localhost:5432/altair_db \
            BIND_ADDR=0.0.0.0:8000 \
            ./apps/server/target/debug/altair-server &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          sleep 3
          curl -sf http://localhost:8000/health | grep '"status":"ok"' || (echo "FAIL: health check" && kill $SERVER_PID && exit 1)
          echo "Health check PASS"
          kill $SERVER_PID

      - name: Rollback migrations (FA-010)
        run: |
          for i in 1 2 3 4; do
            DATABASE_URL=postgres://altair_user:change_me_in_production@localhost:5432/altair_db \
              sqlx migrate revert --source infra/migrations
          done
          COUNT=$(PGPASSWORD=change_me_in_production psql -h localhost -U altair_user altair_db -tAc \
            "SELECT count(*) FROM information_schema.tables WHERE table_schema = 'public' AND table_name != '_sqlx_migrations'")
          [ "$COUNT" -eq 0 ] || (echo "FAIL: tables remain after rollback" && exit 1)
          echo "Rollback PASS"

      - name: Secret scan (FA-012)
        run: |
          if git grep -rE "(password|secret|key)\s*=\s*['\"][^\$\{c]" \
              -- . ':!*.example' ':!*.md' ':!*.lock' ':!*.sql'; then
            echo "FAIL: potential secrets found in codebase"
            exit 1
          fi
          echo "Secret scan passed — no secrets found"

      - name: Tear down stack
        if: always()
        run: docker compose -f infra/compose/docker-compose.yml down -v
