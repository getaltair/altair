name: Web (TypeScript/JS)

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/web.yml'
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            apps/web/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('apps/web/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        working-directory: apps/web
        run: bun install --frozen-lockfile

      - name: Generate paraglide i18n files
        working-directory: apps/web
        run: bunx @inlang/paraglide-js compile --project ./project.inlang --outdir ./src/lib/paraglide

      - name: Type check
        working-directory: apps/web
        run: bun run check

      - name: Lint
        working-directory: apps/web
        run: bun run lint

      - name: Build
        working-directory: apps/web
        run: bun run build

      - name: Test
        working-directory: apps/web
        run: bun run test:unit -- --run
