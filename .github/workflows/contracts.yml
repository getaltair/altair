name: Contracts

on:
  push:
    branches: [main]
    paths:
      - 'packages/contracts/**'
      - 'scripts/generate_contracts.py'
      - '.github/workflows/contracts.yml'
  pull_request:
    paths:
      - 'packages/contracts/**'
      - 'scripts/generate_contracts.py'
      - '.github/workflows/contracts.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Run generator
        run: python scripts/generate_contracts.py --root packages/contracts

      - name: Check for stale artifacts
        run: |
          if ! git diff --exit-code --quiet packages/contracts/generated; then
            echo '::error::Generated artifacts are stale. Run: python scripts/generate_contracts.py --root packages/contracts'
            echo 'Changed files:'
            git diff --name-only packages/contracts/generated
            exit 1
          fi

      - name: Run contract validation tests
        run: pytest tests/ -v
